<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM SURYAGHAR MBY: Loan EMI Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#e3f2fd,#ffffff);
  margin:0;
}

.container { max-width:1100px; margin:auto; padding:15px; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1565c0;
  color:white;
  padding:12px;
  border-radius:10px;
}

.logo { height:50px; }

.title { text-align:center; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  margin-top:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.form-group { margin-bottom:12px; }

label { font-weight:bold; display:block; }

input {
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  margin-top:8px;
  background:linear-gradient(45deg,#1565c0,#42a5f5);
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th, td {
  border:1px solid #000;
  padding:6px;
  text-align:center;
}

th {
  background:#1565c0;
  color:white;
}

/* MOBILE */
@media(max-width:768px){
  .grid { grid-template-columns:1fr; }
  .header { flex-direction:column; gap:10px; }
  .logo { height:40px; }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="dgvcl_logo.png" class="logo">
  <div class="title">
    <h3>PM SURYAGHAR MBY</h3>
    <p>Loan EMI Calculator</p>
  </div>
  <img src="dgvcl_logo.png" class="logo">
</div>

<div class="links">
<a href="https://www.jansamarth.in/home" target="_blank">Apply Loan</a> |
<a href="https://consumer.pmsuryaghar.gov.in/consumer/#/login" target="_blank">PM SuryaGhar Portal</a>
</div>
<div class="grid">

<div class="card">
<h3>Applicant Details</h3>

<div class="form-group">
<label>Name</label>
<input id="name">
</div>

<div class="form-group">
<label>Capacity (kW)</label>
<input id="capacity" oninput="autoSubsidy()">
</div>

<div class="form-group">
<label>Cost</label>
<input id="cost">
</div>

<div class="form-group">
<label>Subsidy</label>
<input id="subsidy" readonly>
</div>

<div class="form-group">
<label>Interest (%)</label>
<input id="rate">
</div>

<div class="form-group">
<label>Tenure (Years)</label>
<input id="tenure">
</div>

<button onclick="calculate()">Calculate</button>
</div>

<div class="card">
<h3>Summary</h3>
<p>Loan: ₹ <span id="loan"></span></p>
<p>EMI: ₹ <span id="emi"></span></p>
<p>Interest: ₹ <span id="interest"></span></p>
<canvas id="chart"></canvas>
</div>

</div>

<div class="card">
<h3>EMI Schedule</h3>

<table>
<thead>
<tr>
<th>M</th><th>Opening</th><th>EMI</th><th>Interest</th><th>Principal</th><th>Closing</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<script>

let scheduleData=[];

function autoSubsidy(){
let cap=+document.getElementById("capacity").value||0;
let sub=cap<=2?cap*30000:cap<=3?60000+(cap-2)*18000:78000;
document.getElementById("subsidy").value=sub;
}

function emiCalc(P,r,n){
return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

function calculate(){

let cost=+document.getElementById("cost").value;
let sub=+document.getElementById("subsidy").value;
let r=(+document.getElementById("rate").value)/12/100;
let n=(+document.getElementById("tenure").value)*12;

let emiBefore=emiCalc(cost,r,n);

let balance=cost;
let emiAfter=emiBefore;

scheduleData=[];
let html="";

for(let i=1;i<=n;i++){

if(i==3){
balance-=sub;
emiAfter=emiCalc(balance,r,n-2);
}

let emi=i<=2?emiBefore:emiAfter;
let interest=balance*r;
let principal=emi-interest;
let closing=balance-principal;

if(i===n){
principal=balance;
emi=interest+principal;
closing=0;
}

scheduleData.push([i,balance,emi,interest,principal,closing]);

html+=`<tr>
<td>${i}</td>
<td>${Math.round(balance)}</td>
<td>${Math.round(emi)}</td>
<td>${Math.round(interest)}</td>
<td>${Math.round(principal)}</td>
<td>${Math.round(closing)}</td>
</tr>`;

balance=closing;
}

document.getElementById("loan").innerText=Math.round(cost);
document.getElementById("emi").innerText=Math.round(emiAfter);
document.getElementById("interest").innerText=Math.round(scheduleData.reduce((a,b)=>a+b[3],0));

document.getElementById("table").innerHTML=html;

drawChart(cost);
}

function drawChart(loan){
let interest=scheduleData.reduce((a,b)=>a+b[3],0);

new Chart(document.getElementById("chart"),{
type:'pie',
data:{labels:['Principal','Interest'],datasets:[{data:[loan,interest]}]}
});
}

/* ===== FINAL BANK STYLE PDF ===== */
function downloadPDF(){

if(scheduleData.length===0){
alert("Please calculate first");
return;
}

const doc = new window.jspdf.jsPDF();

let name = document.getElementById("name").value || "NA";
let loan = document.getElementById("loan").innerText;
let emi = document.getElementById("emi").innerText;
let interest = document.getElementById("interest").innerText;
let now = new Date().toLocaleString();

// HEADER
doc.setFont("helvetica","bold");
doc.setFontSize(14);
doc.text("PM SURYAGHAR MBY - LOAN STATEMENT",105,15,null,null,"center");

// DETAILS
doc.setFontSize(10);
doc.setFont("helvetica","normal");
doc.text("Name: "+name,15,25);
doc.text("Loan: Rs. "+loan,15,32);
doc.text("EMI: Rs. "+emi,15,39);
doc.text("Interest: Rs. "+interest,15,46);
doc.text("Date: "+now,15,53);

// TABLE HEADER
let y=60;
doc.setFillColor(200,200,200);
doc.rect(10,y-5,190,7,"F");

doc.text("M",12,y);
doc.text("Opening",30,y);
doc.text("EMI",65,y);
doc.text("Interest",95,y);
doc.text("Principal",125,y);
doc.text("Closing",160,y);

y+=7;

// TABLE DATA
scheduleData.forEach(row=>{

if(y>280){
doc.addPage();
y=20;
}

doc.rect(10,y-5,190,7); // BORDER

doc.text(String(row[0]),12,y);
doc.text("Rs."+Math.round(row[1]),30,y);
doc.text("Rs."+Math.round(row[2]),65,y);
doc.text("Rs."+Math.round(row[3]),95,y);
doc.text("Rs."+Math.round(row[4]),125,y);
doc.text("Rs."+Math.round(row[5]),160,y);

y+=7;
});

doc.save("Loan_Statement.pdf");
}

function exportExcel(){
let csv="Month,Opening,EMI,Interest,Principal,Closing\n";
scheduleData.forEach(r=>csv+=r.join(",")+"\n");

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="EMI_Schedule.csv";
a.click();
}

</script>

</body>
</html>
