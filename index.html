<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM SURYAGHAR MBY: Loan EMI Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#e3f2fd,#fff); margin:0; }
.container { max-width:1100px; margin:auto; padding:15px; }

.header {
display:flex; justify-content:space-between; align-items:center;
background:#1565c0; color:white; padding:12px; border-radius:10px;
}

.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-top:15px; }

.card {
background:white; padding:20px; border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input { width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc; }

button {
width:100%; padding:12px; margin-top:8px;
background:linear-gradient(45deg,#1565c0,#42a5f5);
color:white; border:none; border-radius:6px; cursor:pointer;
}

table { width:100%; border-collapse:collapse; margin-top:15px; }
th,td { border:1px solid #ccc; padding:6px; text-align:center; }
th { background:#1565c0; color:white; }

@media(max-width:768px){
.grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h3>PM SURYAGHAR MBY - EMI Calculator</h3>
</div>

<div class="grid">

<div class="card">
<h3>Inputs</h3>
<input id="name" placeholder="Applicant Name">
<input id="capacity" placeholder="Capacity (kW)" oninput="autoSubsidy()">
<input id="cost" placeholder="Cost">
<input id="subsidy" placeholder="Subsidy" readonly>
<input id="rate" placeholder="Interest %">
<input id="tenure" placeholder="Tenure (Years)">
<button onclick="calculate()">Calculate</button>
</div>

<div class="card">
<h3>Summary</h3>
<div>Loan: <b id="loan"></b></div>
<div>EMI: <b id="emi"></b></div>
<div>Interest: <b id="interest"></b></div>
<canvas id="chart"></canvas>
</div>

</div>

<div class="card">
<h3>EMI Schedule</h3>

<table>
<thead>
<tr>
<th>M</th><th>Opening</th><th>EMI</th><th>Interest</th><th>Principal</th><th>Closing</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<script>

let scheduleData=[];

function autoSubsidy(){
let cap=Number(document.getElementById("capacity").value)||0;
document.getElementById("subsidy").value =
cap<=2?cap*30000:cap<=3?60000+(cap-2)*18000:78000;
}

function emiCalc(P,r,n){
return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

function calculate(){

let cost=Number(document.getElementById("cost").value);
let sub=Number(document.getElementById("subsidy").value);
let r=Number(document.getElementById("rate").value)/12/100;
let n=Number(document.getElementById("tenure").value)*12;

let emiBefore=emiCalc(cost,r,n);

let balance=cost;
let emiAfter=emiBefore;

scheduleData=[];
let html="";

for(let i=1;i<=n;i++){

if(i==3){
balance-=sub;
emiAfter=emiCalc(balance,r,n-2);
}

let emi=i<=2?emiBefore:emiAfter;
let interest=balance*r;
let principal=emi-interest;
let closing=balance-principal;

if(i===n){
principal=balance;
emi=interest+principal;
closing=0;
}

scheduleData.push([i,balance,emi,interest,principal,closing]);

html+=`<tr>
<td>${i}</td>
<td>${Math.round(balance)}</td>
<td>${Math.round(emi)}</td>
<td>${Math.round(interest)}</td>
<td>${Math.round(principal)}</td>
<td>${Math.round(closing)}</td>
</tr>`;

balance=closing;
}

document.getElementById("loan").innerText=Math.round(cost);
document.getElementById("emi").innerText=Math.round(emiAfter);
document.getElementById("interest").innerText=Math.round(scheduleData.reduce((a,b)=>a+b[3],0));
document.getElementById("table").innerHTML=html;

drawChart(cost);
}

function drawChart(loan){
let interest=scheduleData.reduce((a,b)=>a+b[3],0);

new Chart(document.getElementById("chart"),{
type:'pie',
data:{labels:['Principal','Interest'],datasets:[{data:[loan,interest]}]}
});
}

function downloadPDF(){

if(scheduleData.length===0){
alert("Please calculate first");
return;
}

// ✅ CORRECT INITIALIZATION
const doc = new window.jspdf.jsPDF();

let nameVal = document.getElementById("name").value || "NA";
let loanVal = document.getElementById("loan").innerText;
let emiVal = document.getElementById("emi").innerText;
let intVal = document.getElementById("interest").innerText;

let now = new Date().toLocaleString();

// HEADER
doc.setFont("helvetica","normal");
doc.setFontSize(14);
doc.text("PM SURYAGHAR LOAN STATEMENT",105,15,null,null,"center");

// DETAILS
doc.setFontSize(10);
doc.text("Name: "+nameVal,15,25);
doc.text("Loan: Rs. "+loanVal,15,32);
doc.text("EMI: Rs. "+emiVal,15,39);
doc.text("Interest: Rs. "+intVal,15,46);
doc.text("Generated: "+now,15,53);

// TABLE
let y=60;
doc.setFontSize(8);

doc.text("M",10,y);
doc.text("Opening",25,y);
doc.text("EMI",55,y);
doc.text("Interest",80,y);
doc.text("Principal",110,y);
doc.text("Closing",140,y);

y+=5;

scheduleData.forEach(r=>{

if(y>280){
doc.addPage();
y=20;
}

doc.text(String(r[0]),10,y);
doc.text("Rs."+Math.round(r[1]),25,y);
doc.text("Rs."+Math.round(r[2]),55,y);
doc.text("Rs."+Math.round(r[3]),80,y);
doc.text("Rs."+Math.round(r[4]),110,y);
doc.text("Rs."+Math.round(r[5]),140,y);

y+=5;
});

doc.save("Loan_Statement.pdf");
}

function exportExcel(){
let csv="Month,Opening,EMI,Interest,Principal,Closing\n";
scheduleData.forEach(r=>csv+=r.join(",")+"\n");

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="EMI_Schedule.csv";
a.click();
}

</script>

</body>
</html>
