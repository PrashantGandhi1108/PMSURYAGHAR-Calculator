<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM SURYAGHAR MBY: Loan EMI Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e3f2fd, #ffffff);
  margin:0;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:20px;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1565c0;
  color:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
}

.logo { height:50px; }

.title { text-align:center; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button {
  width:100%;
  padding:12px;
  background:linear-gradient(45deg,#1565c0,#42a5f5);
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.metric {
  display:flex;
  justify-content:space-between;
  padding:8px;
}

.metric b { color:#0d47a1; }

.chart-box {
  max-width:300px;
  margin:20px auto;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

th, td {
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
}

th {
  background:#1565c0;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="dgvcl_logo.png" class="logo">
  <div class="title">
    <h2>PM SURYAGHAR MBY</h2>
    <p>Loan EMI Calculator</p>
  </div>
  <img src="dgvcl_logo.png" class="logo">
</div>

<div class="grid">

<div class="card">
<h3>Inputs</h3>

<label>Name</label>
<input id="name">

<label>Capacity (kW)</label>
<input id="capacity" oninput="autoSubsidy()">

<label>Cost (₹)</label>
<input id="cost">

<label>Subsidy</label>
<input id="subsidy" readonly>

<label>Interest (%)</label>
<input id="rate">

<label>Tenure (Years)</label>
<input id="tenure">

<button onclick="calculate()">Calculate</button>
</div>

<div class="card">
<h3>Summary</h3>

<div class="metric"><span>Loan</span><b>₹ <span id="loan"></span></b></div>
<div class="metric"><span>EMI</span><b>₹ <span id="emi"></span></b></div>
<div class="metric"><span>Interest</span><b>₹ <span id="interest"></span></b></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

</div>

<div class="card">
<h3>EMI Schedule</h3>

<table>
<thead>
<tr>
<th>Month</th><th>Opening</th><th>EMI</th><th>Interest</th><th>Principal</th><th>Closing</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button onclick="downloadPDF()">Download PDF</button>
<button onclick="window.print()">Print</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<script>

let scheduleData=[];

function autoSubsidy(){
let cap=+capacity.value||0;
let sub=cap<=2?cap*30000:cap<=3?60000+(cap-2)*18000:78000;
subsidy.value=sub;
}

function emiCalc(P,r,n){
return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

function calculate(){

let cost=+cost.value;
let sub=+subsidy.value;
let r=(+rate.value)/12/100;
let n=(+tenure.value)*12;

let emiBefore=emiCalc(cost,r,n);

let balance=cost;
let emiAfter=emiBefore;

scheduleData=[];
let table="";

for(let i=1;i<=n;i++){

if(i==3){
balance-=sub;
emiAfter=emiCalc(balance,r,n-2);
}

let emi=i<=2?emiBefore:emiAfter;

let interest=balance*r;
let principal=emi-interest;
let closing=balance-principal;

if(i===n){
principal=balance;
emi=interest+principal;
closing=0;
}

scheduleData.push([i,balance,emi,interest,principal,closing]);

table+=`<tr ${i==3?"style='background:#fff3cd'":""}>
<td>${i}</td>
<td>${Math.round(balance)}</td>
<td>${Math.round(emi)}</td>
<td>${Math.round(interest)}</td>
<td>${Math.round(principal)}</td>
<td>${Math.round(closing)}</td>
</tr>`;

balance=closing;
}

loan.innerText=Math.round(cost);
emi.innerText=Math.round(emiAfter);
interest.innerText=Math.round(scheduleData.reduce((a,b)=>a+b[3],0));

drawChart(cost);
}

function drawChart(loan){
let interest=scheduleData.reduce((a,b)=>a+b[3],0);

if(window.chartObj){chartObj.destroy();}

chartObj=new Chart(chart,{
type:'pie',
data:{labels:['Principal','Interest'],datasets:[{data:[loan,interest]}]}
});
}

async function downloadPDF(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.setFont("helvetica","normal");

let l=loan.innerText;
let e=emi.innerText;

doc.text("PM SURYAGHAR LOAN STATEMENT",20,20);
doc.text("Loan: Rs. "+l,20,30);
doc.text("EMI: Rs. "+e,20,40);

doc.save("report.pdf");
}

function exportExcel(){
let csv="Month,Opening,EMI,Interest,Principal,Closing\n";

scheduleData.forEach(r=>{
csv+=r.join(",")+"\n";
});

let blob=new Blob([csv],{type:"text/csv"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="emi_schedule.csv";
a.click();
}

</script>

</body>
</html>
