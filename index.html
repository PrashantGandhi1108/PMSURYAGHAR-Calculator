<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM SURYAGHAR MBY: Loan EMI Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; background:#eef5ff;}
.container {max-width:1100px;margin:auto;padding:20px;}
.card {background:#fff;padding:20px;border-radius:10px;}
input {width:100%;padding:8px;margin:5px 0;}
button {padding:10px;background:#1565c0;color:#fff;border:none;}
table {width:100%;border-collapse:collapse;margin-top:15px;}
th,td {border:1px solid #ccc;padding:6px;font-size:12px;text-align:center;}
th {background:#e3f2fd;}
.links {text-align:center;margin:10px;}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div style="display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #1565c0; padding-bottom:10px; margin-bottom:15px;">
  <img src="dgvcl_logo.png" style="height:25px;">
  <div style="text-align:center;">
    <h2 style="margin:0; color:#0d47a1;">PM SURYAGHAR MBY</h2>
    <h3 style="margin:0;">Loan EMI Calculator</h3>
  </div>
  <img src="dgvcl_logo.png" style="height:25px;">
</div>

<div class="links">
<a href="https://www.jansamarth.in/home" target="_blank">Apply Loan</a> |
<a href="https://consumer.pmsuryaghar.gov.in/consumer/#/login" target="_blank">PM SuryaGhar Portal</a>
</div>

<div class="card">

<label>Applicant Name</label>
<input id="name">

<label>Solar Capacity (kW)</label>
<input id="capacity" oninput="autoSubsidy()">

<label>Total Project Cost (₹)</label>
<input id="cost">

<label>Subsidy (₹)</label>
<input id="subsidy" readonly>

<label>Interest Rate (%)</label>
<input id="rate">

<label>Tenure (Years)</label>
<input id="tenure">

<button onclick="calculate()">Calculate</button>

<p><b>Loan:</b> ₹<span id="loan"></span></p>
<p><b>Revised EMI:</b> ₹<span id="emi"></span></p>
<p><b>Total Interest:</b> ₹<span id="interest"></span></p>

<canvas id="chart"></canvas>

<h3>EMI Schedule</h3>
<table>
<thead>
<tr>
<th>Month</th><th>Opening</th><th>EMI</th><th>Interest</th><th>Principal</th><th>Closing</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<button onclick="downloadPDF()">Download PDF</button>

</div>
</div>

<script>

let scheduleData=[];

function autoSubsidy(){
let cap = parseFloat(document.getElementById('capacity').value)||0;
let sub=0;

if(cap<=2) sub=cap*30000;
else if(cap<=3) sub=60000+(cap-2)*18000;
else sub=78000;

document.getElementById('subsidy').value=sub;
}

function emiCalc(P,r,n){
return P*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}

function calculate(){

let cost=+document.getElementById('cost').value;
let sub=+document.getElementById('subsidy').value;
let r=(+document.getElementById('rate').value)/12/100;
let n=(+document.getElementById('tenure').value)*12;

let emiBefore=emiCalc(cost,r,n);

let balance=cost;
let emiAfter=emiBefore;

scheduleData=[];
let table="";

for(let i=1;i<=n;i++){

if(i==3){
balance -= sub;
emiAfter = emiCalc(balance, r, n-2);
}

let emi=(i<=2)?emiBefore:emiAfter;

let interest=balance*r;
let principal=emi-interest;
let closing=balance-principal;

// final month correction
if(i===n){
principal=balance;
emi=interest+principal;
closing=0;
}

scheduleData.push([i,balance,emi,interest,principal,closing]);

let highlight = (i==3) ? "style='background:#fff3cd; font-weight:bold;'" : "";

table+=`<tr ${highlight}>
<td>${i}</td>
<td>${Math.round(balance).toLocaleString()}</td>
<td>${Math.round(emi).toLocaleString()}</td>
<td>${Math.round(interest).toLocaleString()}</td>
<td>${Math.round(principal).toLocaleString()}</td>
<td>${Math.round(closing).toLocaleString()}</td>
</tr>`;

balance=closing;
}

document.getElementById('loan').innerText=Math.round(cost).toLocaleString();
document.getElementById('emi').innerText=Math.round(emiAfter).toLocaleString();
document.getElementById('interest').innerText=
Math.round(scheduleData.reduce((a,b)=>a+b[3],0)).toLocaleString();

document.getElementById('table').innerHTML=table;

drawChart(cost);
}

function drawChart(loan){
let interest=scheduleData.reduce((a,b)=>a+b[3],0);

new Chart(document.getElementById('chart'),{
type:'pie',
data:{
labels:['Principal','Interest'],
datasets:[{data:[loan,interest]}]
}
});
}

async function downloadPDF(){

const {jsPDF}=window.jspdf;
let doc=new jsPDF();

// LOGO
let img = new Image();
img.src = "dgvcl_logo.png";
doc.addImage(img, 'PNG', 10, 10, 30, 15);
doc.addImage(img, 'PNG', 170, 10, 30, 15);

// TITLE
doc.setFontSize(14);
doc.text("PM SURYAGHAR MBY: LOAN STATEMENT", 105, 20, null, null, "center");

// DETAILS
doc.setFontSize(10);
let name=document.getElementById('name').value || "NA";
let loan=document.getElementById('loan').innerText;
let emi=document.getElementById('emi').innerText;
let interest=document.getElementById('interest').innerText;

doc.text("Applicant: " + name, 20, 35);
doc.text("Loan Amount: ₹" + loan, 20, 42);
doc.text("EMI: ₹" + emi, 20, 49);
doc.text("Total Interest: ₹" + interest, 20, 56);

// TABLE
let y = 65;
let rowHeight = 6;
let colX = [10, 30, 60, 90, 120, 150];

function header(y){
doc.setFillColor(200,200,200);
doc.rect(10, y-5, 190, 6, 'F');

doc.text("M", colX[0], y);
doc.text("Opening", colX[1], y);
doc.text("EMI", colX[2], y);
doc.text("Interest", colX[3], y);
doc.text("Principal", colX[4], y);
doc.text("Closing", colX[5], y);
}

header(y);
y+=5;

scheduleData.forEach((row)=>{

if(y>280){
doc.addPage();
header(20);
y=25;
}

// highlight subsidy row
if(row[0]==3){
doc.setFillColor(255,243,205);
doc.rect(10,y-4,190,rowHeight,'F');
}

doc.rect(10,y-4,190,rowHeight);

doc.text(String(row[0]), colX[0], y);
doc.text(String(Math.round(row[1])), colX[1], y);
doc.text(String(Math.round(row[2])), colX[2], y);
doc.text(String(Math.round(row[3])), colX[3], y);
doc.text(String(Math.round(row[4])), colX[4], y);
doc.text(String(Math.round(row[5])), colX[5], y);

y+=rowHeight;
});

// CHART
let canvas=document.getElementById('chart');
let imgData=canvas.toDataURL("image/png");

doc.addPage();
doc.text("Loan Composition", 20, 20);
doc.addImage(imgData,'PNG',20,30,160,100);

// DISCLAIMER
doc.addPage();
doc.setFontSize(9);
doc.text("* This is indicative illustration. Actual may vary based on inputs and bank terms.",20,20);

doc.save("PM_Suryaghar_Loan_Report.pdf");
}

</script>

</body>
</html>
